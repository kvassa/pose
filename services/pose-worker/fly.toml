# fly launch (from services/pose-worker) — alternative to Railway

app = "pose-match-worker"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[[vm]]
size = "shared-cpu-1x"
memory = "1gb"
